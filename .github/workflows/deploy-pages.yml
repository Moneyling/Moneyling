# Deploy Moneyling.org parent site to GitHub Pages.
# Repo: Settings → Pages → Source: GitHub Actions (then run this workflow).

name: Deploy Moneyling.org (static site)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node.js 24 for actions (avoids deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One Pages deployment at a time; do not cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build
        run: |
          npm install
          npm run build:prod
        env:
          # build:prod sets BASE_PATH=/ in Node so asset paths are /assets/... (no blank screen at root)
          BASE_PATH: /

      - name: Verify built asset paths
        run: |
          echo "=== dist structure ==="
          ls -la dist/ && ls -la dist/assets/ || true
          echo "=== dist/index.html (script/link and build comment) ==="
          grep -E 'src=|href=|build base' dist/index.html || true
          if ! grep -q '/assets/' dist/index.html; then
            echo "::error::index.html must contain /assets/ for root deployment. Use build:prod."
            exit 1
          fi
          echo "OK: Build uses /assets/ for moneyling.org"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

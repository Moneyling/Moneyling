# Deploy Moneyling.org parent site to GitHub Pages.
# Repo: Settings → Pages → Source: GitHub Actions (then run this workflow).

name: Deploy Moneyling.org (static site)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; do not cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Opt into Node.js 24 for actions (avoids Node 20 deprecation warning)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build
        run: |
          npm install
          echo "BASE_PATH=$BASE_PATH"
          npm run build
        env:
          # Project site is at *.github.io/Moneyling/ — assets must be under /Moneyling/
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Verify built asset paths
        run: |
          echo "=== dist/index.html (script/link tags) ==="
          grep -E 'src=|href=' dist/index.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

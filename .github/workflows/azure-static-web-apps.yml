# Deploy to Azure Static Web Apps (optional).
# Use this for stable hosting at moneyling.org instead of GitHub Pages.
#
# The secret name is set by Azure when you connect the repo (e.g. AZURE_STATIC_WEB_APPS_API_TOKEN_<RESOURCE>).
# If your secret has a different suffix, update the reference below to match.

name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: "/"
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_STONE_07758A010 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "dist"
          app_build_command: "npm install && npm run build:prod"
        env:
          BASE_PATH: "/"
